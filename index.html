<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorVault</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#16161f;--bg4:#1c1c28;--bg5:#22223a;
  --border:#ffffff12;--border2:#ffffff20;--border3:#ffffff35;
  --text:#f0f0ff;--text2:#a0a0c0;--text3:#606080;
  --purple:#7c3aed;--purple2:#9f67fa;--purple3:#c4a8ff;--purpleGlow:#7c3aed40;
  --blue:#2563eb;--blue2:#60a5fa;--blueGlow:#2563eb30;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --radius:12px;--radius2:8px;--radius3:16px;
  --sidebar:240px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{display:flex;min-height:100vh}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:4px}

/* AUTH PAGE */
.auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;background:radial-gradient(ellipse at 30% 20%,#1a0a3a 0%,var(--bg) 60%),radial-gradient(ellipse at 80% 80%,#0a1a3a 0%,transparent 50%)}
.auth-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius3);padding:48px;width:100%;max-width:440px;position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--purple2),transparent)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.auth-logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:20px}
.auth-logo-text{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--purple3),var(--blue2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-title{font-size:26px;font-weight:700;margin-bottom:6px}
.auth-sub{color:var(--text2);font-size:14px;margin-bottom:32px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px}
.form-input{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius2);padding:12px 16px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:all 0.2s}
.form-input:focus{border-color:var(--purple2);box-shadow:0 0 0 3px var(--purpleGlow)}
.form-input::placeholder{color:var(--text3)}
.btn{width:100%;padding:13px;border-radius:var(--radius2);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;font-family:'DM Sans',sans-serif}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);margin-top:12px}
.btn-outline:hover{border-color:var(--purple2);color:var(--purple3)}
.auth-hint{font-size:12px;color:var(--text3);margin-top:24px;text-align:center}
.auth-hint span{color:var(--purple3)}

/* LAYOUT */
.layout{display:flex;width:100%;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.sidebar-logo{padding:20px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar-logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sidebar-logo-text{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--purple3),var(--blue2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-nav{padding:16px 12px;flex:1}
.sidebar-section{margin-bottom:24px}
.sidebar-section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:0 8px;margin-bottom:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius2);cursor:pointer;transition:all 0.2s;margin-bottom:2px;color:var(--text2);font-size:13px;font-weight:500;text-decoration:none;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg4);color:var(--text)}
.nav-item.active{background:var(--purpleGlow);color:var(--purple3);border:1px solid var(--purple)30}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--purple);color:#fff;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius2);cursor:pointer}
.user-info:hover{background:var(--bg4)}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.user-name{font-size:13px;font-weight:500}
.user-role{font-size:11px;color:var(--text3)}
.logout-btn{width:100%;margin-top:8px;padding:8px;background:none;border:1px solid var(--border);border-radius:var(--radius2);color:var(--text3);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
.main{margin-left:var(--sidebar);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);backdrop-filter:blur(10px);position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:700;font-family:'Space Grotesk',sans-serif}
.topbar-right{display:flex;align-items:center;gap:12px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius2);padding:8px 14px;font-size:13px;color:var(--text2);cursor:text}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;width:180px}
.search-box input::placeholder{color:var(--text3)}
.icon-btn{width:36px;height:36px;border-radius:var(--radius2);background:var(--bg4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all 0.2s}
.icon-btn:hover{border-color:var(--purple2);color:var(--purple3)}
.content{padding:28px;flex:1;overflow-y:auto}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:all 0.3s}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;opacity:0.06;filter:blur(20px)}
.stat-card.purple::after{background:var(--purple)}
.stat-card.blue::after{background:var(--blue)}
.stat-card.green::after{background:var(--green)}
.stat-card.amber::after{background:var(--amber)}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:18px}
.stat-icon.purple{background:var(--purpleGlow);color:var(--purple3)}
.stat-icon.blue{background:var(--blueGlow);color:var(--blue2)}
.stat-icon.green{background:#10b98120;color:var(--green)}
.stat-icon.amber{background:#f59e0b20;color:var(--amber)}
.stat-value{font-size:28px;font-weight:700;font-family:'Space Grotesk',sans-serif;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--text2);font-weight:500}
.stat-change{font-size:11px;margin-top:8px;display:flex;align-items:center;gap:4px}
.stat-change.up{color:var(--green)}
.stat-change.down{color:var(--red)}

/* CARDS */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-title{font-size:14px;font-weight:600;font-family:'Space Grotesk',sans-serif;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.card-title-left{display:flex;align-items:center;gap:8px}

/* GRID LAYOUTS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* ACTIVITY FEED */
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.activity-dot.purple{background:var(--purple2)}
.activity-dot.blue{background:var(--blue2)}
.activity-dot.green{background:var(--green)}
.activity-dot.amber{background:var(--amber)}
.activity-text{font-size:13px;line-height:1.5}
.activity-text strong{font-weight:600}
.activity-time{font-size:11px;color:var(--text3);margin-top:2px}

/* PROJECTS */
.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.project-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.project-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.project-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.project-badge{font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px}
.badge-youtube{background:#ff000020;color:#ff6060;border:1px solid #ff000030}
.badge-short{background:#ff600020;color:#ff9060;border:1px solid #ff600030}
.badge-instagram{background:#e40a7020;color:#f060c0;border:1px solid #e40a7030}
.badge-stream{background:#9147ff20;color:#b980ff;border:1px solid #9147ff30}
.badge-sponsor{background:#10b98120;color:#4fd1a0;border:1px solid #10b98130}
.badge-brand{background:#3b82f620;color:#60a5fa;border:1px solid #3b82f630}
.project-name{font-size:15px;font-weight:600;margin-bottom:6px;font-family:'Space Grotesk',sans-serif}
.project-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:14px}
.project-meta{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--text3)}
.project-meta span{display:flex;align-items:center;gap:4px}
.project-actions{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.action-btn{flex:1;padding:7px;border-radius:var(--radius2);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:none;color:var(--text2);transition:all 0.2s;font-family:'DM Sans',sans-serif}
.action-btn:hover{border-color:var(--purple2);color:var(--purple3)}
.action-btn.danger:hover{border-color:var(--red);color:var(--red)}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);border-bottom:1px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg4)}

/* STATUS BADGES */
.status{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
.status::before{content:'';width:5px;height:5px;border-radius:50%}
.status-draft{background:#ffffff10;color:var(--text2)}.status-draft::before{background:var(--text3)}
.status-review{background:#f59e0b20;color:var(--amber)}.status-review::before{background:var(--amber)}
.status-approved{background:#10b98120;color:var(--green)}.status-approved::before{background:var(--green)}
.status-published{background:#3b82f620;color:var(--blue2)}.status-published::before{background:var(--blue2)}
.status-active{background:#10b98120;color:var(--green)}.status-active::before{background:var(--green)}
.status-expired{background:#ef444420;color:var(--red)}.status-expired::before{background:var(--red)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:#00000090;backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius3);padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;font-family:'Space Grotesk',sans-serif;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.modal-close{width:28px;height:28px;border-radius:6px;background:var(--bg4);border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:14px}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.modal-actions{display:flex;gap:10px;margin-top:24px}
.modal-btn{flex:1;padding:11px;border-radius:var(--radius2);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;border:none}
.modal-btn.primary{background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff}
.modal-btn.primary:hover{opacity:0.9}
.modal-btn.secondary{background:var(--bg4);border:1px solid var(--border2);color:var(--text2)}
.modal-btn.secondary:hover{border-color:var(--border3)}
.form-select{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius2);padding:12px 16px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;appearance:none;cursor:pointer}
.form-select:focus{border-color:var(--purple2)}
.form-textarea{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius2);padding:12px 16px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;resize:vertical;min-height:80px}
.form-textarea:focus{border-color:var(--purple2)}

/* PAGE HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:22px;font-weight:700;font-family:'Space Grotesk',sans-serif}
.page-sub{font-size:13px;color:var(--text2);margin-top:3px}
.add-btn{display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--radius2);background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.add-btn:hover{opacity:0.9;transform:translateY(-1px)}

/* SEARCH BAR */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:10px 16px;margin-bottom:20px}
.search-bar input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;flex:1}
.search-bar input::placeholder{color:var(--text3)}

/* VERSION TIMELINE */
.version-timeline{position:relative;padding-left:28px}
.version-timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:1px;background:var(--border2)}
.version-item{position:relative;margin-bottom:20px}
.version-dot{position:absolute;left:-24px;top:12px;width:12px;height:12px;border-radius:50%;background:var(--purple2);border:2px solid var(--bg3);box-shadow:0 0 8px var(--purple)}
.version-dot.latest{background:var(--green);box-shadow:0 0 8px var(--green)}
.version-box{background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius2);padding:14px 16px}
.version-box:hover{border-color:var(--border2)}
.version-num{font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.version-date{font-size:11px;color:var(--text3)}
.version-note{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5}

/* ANALYTICS */
.chart-bar{display:flex;align-items:flex-end;gap:6px;height:120px;margin-top:12px}
.bar{flex:1;border-radius:4px 4px 0 0;transition:all 0.3s;position:relative;cursor:pointer;min-width:0}
.bar:hover{opacity:0.8}
.bar-label{font-size:9px;color:var(--text3);text-align:center;margin-top:4px}
.pie-wrap{display:flex;align-items:center;gap:20px}
.pie-legend{flex:1}
.pie-legend-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.pie-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.pie-legend-val{margin-left:auto;font-weight:600;font-family:'Space Grotesk',sans-serif}

/* SHARE LINK */
.share-link-box{display:flex;align-items:center;gap:8px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius2);padding:10px 14px}
.share-link-text{font-size:12px;color:var(--blue2);font-family:'DM Mono',monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{padding:5px 12px;background:var(--purple);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif}
.copy-btn:hover{background:var(--purple2)}

/* SETTINGS */
.settings-section{margin-bottom:32px}
.settings-section-title{font-size:15px;font-weight:600;font-family:'Space Grotesk',sans-serif;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:14px;font-weight:500}
.settings-sub{font-size:12px;color:var(--text2);margin-top:2px}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--bg5);border:none;cursor:pointer;position:relative;transition:all 0.2s;flex-shrink:0}
.toggle.on{background:var(--purple)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:all 0.2s}
.toggle.on::after{left:21px}
.storage-bar{background:var(--bg5);border-radius:4px;height:6px;margin-top:8px;overflow:hidden}
.storage-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--purple),var(--blue))}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.4}
.empty-title{font-size:16px;font-weight:600;font-family:'Space Grotesk',sans-serif;margin-bottom:8px;color:var(--text)}
.empty-sub{font-size:13px;color:var(--text2);max-width:300px;line-height:1.5}

/* CHIP */
.chip{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:var(--bg5);color:var(--text2);display:inline-flex;align-items:center;gap:4px}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:4px}
.tab{padding:8px 18px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all 0.2s;border:none;background:none;font-family:'DM Sans',sans-serif}
.tab.active{background:var(--purpleGlow);color:var(--purple3);border:1px solid var(--purple)30}
.tab:hover:not(.active){color:var(--text)}

/* TOOLTIP */
.tooltip{position:relative}
.tooltip:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:11px;white-space:nowrap;z-index:100}

/* notification */
.notif{position:fixed;top:20px;right:20px;background:var(--bg3);border:1px solid var(--green)50;border-radius:var(--radius2);padding:12px 18px;font-size:13px;font-weight:500;color:var(--green);z-index:999;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px #00000060;transform:translateY(-10px);opacity:0;transition:all 0.3s;pointer-events:none}
.notif.show{transform:translateY(0);opacity:1}
.notif.error{color:var(--red);border-color:var(--red)50}

/* ASSET TYPE ICON */
.asset-type-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.type-thumbnail{background:#9f67fa20;color:#c4a8ff}
.type-script{background:#10b98120;color:var(--green)}

function getLS(k,def){try{const v=localStorage.getItem('cv_'+k);return v?JSON.parse(v):def}catch{return def}}
function setLS(k,v){try{localStorage.setItem('cv_'+k,JSON.stringify(v))}catch{}}

function initData(){

    setLS('projects',SEED_PROJECTS);
    setLS('assets',SEED_ASSETS);
    setLS('versions',SEED_VERSIONS);
    setLS('shares',SEED_SHARES);
    setLS('logs',SEED_LOGS);

function addLog(action,details){
  const logs=getLogs();
  const now=new Date();
  const ts=now.toISOString().slice(0,10)+' '+now.toTimeString().slice(0,5);
  logs.unshift({id:'l'+Date.now(),action,details,user:'Copper',timestamp:ts});
  saveLogs(logs.slice(0,100));
}

// ===== NOTIFICATION =====
function showNotif(msg,type='success'){
  let el=document.getElementById('notif');
  if(!el){el=document.createElement('div');el.id='notif';el.className='notif';document.body.appendChild(el);}
  el.innerHTML=`<span style="font-size:16px">${type==='success'?'✓':'✕'}</span> ${msg}`;
  el.className='notif'+(type==='error'?' error':'');
  setTimeout(()=>el.classList.add('show'),10);
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2800);
}

function bindAuth(){
  document.getElementById('login-btn').onclick=()=>doLogin();
  document.getElementById('demo-btn').onclick=()=>{
    document.getElementById('auth-email').value='copper@creatorvault.com';
    document.getElementById('auth-pass').value='creator123';
    doLogin();
  };
  document.getElementById('auth-pass').onkeydown=e=>{if(e.key==='Enter')doLogin()};
}

function doLogin(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const err=document.getElementById('auth-err');
  if(email==='copper@creatorvault.com'&&pass==='creator123'){
    state.user=DEMO_USER;setLS('auth',DEMO_USER);
    initData();render();
  }else{
    err.style.display='block';
    err.textContent='Invalid email or password. Try the demo credentials.';
  }
}

  if(p==='settings')return renderSettings();

}

// ===== MODAL =====
function renderModal(){
  const m=state.modal;
  return`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">${renderModalContent(m)}</div>
  </div>`;
}

function renderModalContent(m){
  if(m.type==='createProject')return renderCreateProject();
  if(m.type==='editProject')return renderEditProject(m.id);
  if(m.type==='uploadAsset')return renderUploadAsset();
  if(m.type==='editAsset')return renderEditAsset(m.id);
  if(m.type==='addVersionModal')return renderAddVersion(m.id);
  if(m.type==='createShare')return renderCreateShare();
  if(m.type==='shareAsset')return renderShareAsset(m.id);
  return '';
}

function openModal(type,id,extra){state.modal={type,id,extra};render()}
function closeModal(){state.modal=null;render()}

function renderCreateProject(){
  const cats=['YouTube Video','YouTube Shorts','Instagram Reel','Stream Content','Sponsorship','Branding'];
  return`
  <div class="modal-title">✨ Create New Project<button class="modal-close" onclick="closeModal()">${icons.x}</button></div>
  <div class="form-group"><label class="form-label">Project Name</label><input class="form-input" id="m-name" placeholder="My Awesome Project"></div>
  <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="m-desc" placeholder="What's this project about?"></textarea></div>
  <div class="form-group"><label class="form-label">Category</label>
    <select class="form-select" id="m-cat">
      ${cats.map(c=>`<option>${c}</option>`).join('')}
    </select>
  </div>
  <div class="modal-actions">
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
    <button class="modal-btn primary" onclick="createProject()">Create Project</button>
  </div>`;
}

function createProject(){
  const name=document.getElementById('m-name')?.value?.trim();
  const desc=document.getElementById('m-desc')?.value?.trim();
  const cat=document.getElementById('m-cat')?.value;
  if(!name){showNotif('Please enter a project name','error');return;}
  const catClass={'YouTube Video':'badge-youtube','YouTube Shorts':'badge-short','Instagram Reel':'badge-instagram','Stream Content':'badge-stream','Sponsorship':'badge-sponsor','Branding':'badge-brand'};
  const projects=getProjects();
  const newP={id:'p'+Date.now(),name,desc:desc||'No description',category:cat,createdAt:new Date().toISOString().slice(0,10),assets:0,color:catClass[cat]||'badge-youtube'};
  projects.push(newP);saveProjects(projects);
  addLog('Project Created',name);
  showNotif('Project created!');closeModal();state.page='projects';render();
}

function renderEditProject(id){
  const p=getProjects().find(x=>x.id===id);
  if(!p)return'<div>Project not found</div>';
  const cats=['YouTube Video','YouTube Shorts','Instagram Reel','Stream Content','Sponsorship','Branding'];
  return`
  <div class="modal-title">✏️ Edit Project<button class="modal-close" onclick="closeModal()">${icons.x}</button></div>
  <div class="form-group"><label class="form-label">Project Name</label><input class="form-input" id="m-name" value="${p.name}"></div>
  <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="m-desc">${p.desc}</textarea></div>
  <div class="form-group"><label class="form-label">Category</label>
    <select class="form-select" id="m-cat">
      ${cats.map(c=>`<option ${c===p.category?'selected':''}>${c}</option>`).join('')}
    </select>
  </div>
  <div class="modal-actions">
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
    <button class="modal-btn primary" onclick="editProject('${id}')">Save Changes</button>
  </div>`;
}

function editProject(id){
  const name=document.getElementById('m-name')?.value?.trim();
  const desc=document.getElementById('m-desc')?.value?.trim();
  const cat=document.getElementById('m-cat')?.value;
  if(!name){showNotif('Project name required','error');return;}
  const catClass={'YouTube Video':'badge-youtube','YouTube Shorts':'badge-short','Instagram Reel':'badge-instagram','Stream Content':'badge-stream','Sponsorship':'badge-sponsor','Branding':'badge-brand'};
  const projects=getProjects().map(p=>p.id===id?{...p,name,desc:desc||p.desc,category:cat,color:catClass[cat]||p.color}:p);
  saveProjects(projects);addLog('Project Updated',name);showNotif('Project updated!');closeModal();render();
}

function renderUploadAsset(){
  const projects=getProjects();
  return`
  <div class="modal-title">⬆️ Upload Asset<button class="modal-close" onclick="closeModal()">${icons.x}</button></div>
  <div class="form-group"><label class="form-label">Asset Name</label><input class="form-input" id="m-aname" placeholder="thumbnail_v1.png"></div>
  <div class="form-group"><label class="form-label">Project</label>
    <select class="form-select" id="m-aproj">
      ${projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}
    </select>
  </div>
  <div class="form-group"><label class="form-label">Asset Type</label>
    <select class="form-select" id="m-atype">
      ${ASSET_TYPES.map(t=>`<option>${t}</option>`).join('')}
    </select>
  </div>
  <div class="form-group"><label class="form-label">Status</label>
    <select class="form-select" id="m-astat">
      ${ASSET_STATUSES.map(s=>`<option>${s}</option>`).join('')}
    </select>
  </div>
  <div class="form-group"><label class="form-label">File Upload</label>
    <div style="border:2px dashed var(--border2);border-radius:var(--radius2);padding:24px;text-align:center;cursor:pointer" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" style="display:none" onchange="handleFileSelect(this)">
      <div style="font-size:24px;margin-bottom:8px">📎</div>
      <div style="font-size:13px;color:var(--text2)">Click to browse or drag & drop</div>
      <div id="file-name" style="font-size:12px;color:var(--purple3);margin-top:6px"></div>
    </div>
  </div>
  <div class="modal-actions">
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
    <button class="modal-btn primary" onclick="uploadAsset()">Upload Asset</button>
  </div>`;
}

function handleFileSelect(input){
  const f=input.files?.[0];
  if(f){
    document.getElementById('file-name').textContent='📄 '+f.name;
    const nameField=document.getElementById('m-aname');
    if(!nameField.value)nameField.value=f.name;
  }
}

function uploadAsset(){
  const name=document.getElementById('m-aname')?.value?.trim();
  const projId=document.getElementById('m-aproj')?.value;
  const type=document.getElementById('m-atype')?.value;
  const status=document.getElementById('m-astat')?.value;
  if(!name){showNotif('Asset name required','error');return;}
  const assets=getAssets();
  const today=new Date().toISOString().slice(0,10);
  const newA={id:'a'+Date.now(),projectId:projId,name,type,status,uploadDate:today,size:'—',versions:1};
  assets.push(newA);saveAssets(assets);
  const projects=getProjects().map(p=>p.id===projId?{...p,assets:p.assets+1}:p);saveProjects(projects);
  addLog('Asset Uploaded',name);showNotif('Asset uploaded!');closeModal();render();
}

function renderEditAsset(id){
  const a=getAssets().find(x=>x.id===id);
  if(!a)return'';
  return`
  <div class="modal-title">✏️ Edit Asset<button class="modal-close" onclick="closeModal()">${icons.x}</button></div>
  <div class="form-group"><label class="form-label">Asset Name</label><input class="form-input" id="m-aname" value="${a.name}"></div>
  <div class="form-group"><label class="form-label">Type</label>
    <select class="form-select" id="m-atype">
      ${ASSET_TYPES.map(t=>`<option ${t===a.type?'selected':''}>${t}</option>`).join('')}
    </select>
  </div>
  <div class="form-group"><label class="form-label">Status</label>
    <select class="form-select" id="m-astat">
      ${ASSET_STATUSES.map(s=>`<option ${s===a.status?'selected':''}>${s}</option>`).join('')}
    </select>
  </div>
  <div class="modal-actions">
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
    <button class="modal-btn primary" onclick="editAsset('${id}')">Save Changes</button>
  </div>`;
}

function editAsset(id){
  const name=document.getElementById('m-aname')?.value?.trim();
  const type=document.getElementById('m-atype')?.value;
  const status=document.getElementById('m-astat')?.value;
  if(!name){showNotif('Name required','error');return;}
  const assets=getAssets().map(a=>a.id===id?{...a,name,type,status}:a);
  saveAssets(assets);addLog('Asset Status Updated',`${name} → ${status}`);showNotif('Asset updated!');closeModal();render();
}

function renderAddVersion(assetId){
  const a=getAssets().find(x=>x.id===assetId);
  const versions=getVersions();
  const vList=versions[assetId]||[];
  return`
  <div class="modal-title">⚡ Add Version<button class="modal-close" onclick="closeModal()">${icons.x}</button></div>
  ${a?`<div style="background:var(--bg4);border-radius:var(--radius2);padding:10px 14px;margin-bottom:20px;font-size:13px;color:var(--text2)">Asset: <strong style="color:var(--text)">${a.name}</strong> · Version ${vList.length+1}</div>`:''}
  <div class="form-group"><label class="form-label">Version Notes</label><textarea class="form-textarea" id="m-vnote" placeholder="Describe what changed in this version..."></textarea></div>
  <div class="modal-actions">
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
    <button class="modal-btn primary" onclick="addVersionEntry('${assetId}')">Add Version</button>
  </div>`;
}

function addVersionEntry(assetId){
  const note=document.getElementById('m-vnote')?.value?.trim();
  const versions=getVersions();
  const vList=versions[assetId]||[];
  const newV={version:vList.length+1,date:new Date().toISOString().slice(0,10),note:note||'New version',uploadedBy:'Copper'};
  versions[assetId]=[...vList,newV];saveVersions(versions);
  const assets=getAssets().map(a=>a.id===assetId?{...a,versions:vList.length+1}:a);saveAssets(assets);
  addLog('Version Added',`v${newV.version} added`);showNotif('Version added!');closeModal();state.page='versions';state.versionAsset=assetId;render();
}

function renderCreateShare(){
  const assets=getAssets();
  return`
  <div class="modal-title">🔗 Create Share Link<button class="modal-close" onclick="closeModal()">${icons.x}</button></div>
  <div class="form-group"><label class="form-label">Asset</label>
    <select class="form-select" id="m-shasset">
      ${assets.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}
    </select>
  </div>
  <div class="form-group"><label class="form-label">Share With</label><input class="form-input" id="m-shwith" placeholder="Editor name or email"></div>
  <div class="form-group"><label class="form-label">Expiry Date</label><input class="form-input" id="m-shexp" type="date" value="${new Date(Date.now()+30*86400000).toISOString().slice(0,10)}"></div>
  <div class="modal-actions">
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
    <button class="modal-btn primary" onclick="createShare()">Generate Link</button>
  </div>`;
}

function renderShareAsset(assetId){
  const a=getAssets().find(x=>x.id===assetId);
  return`
  <div class="modal-title">🔗 Share Asset<button class="modal-close" onclick="closeModal()">${icons.x}</button></div>
  ${a?`<div style="background:var(--bg4);border-radius:var(--radius2);padding:10px 14px;margin-bottom:20px;font-size:13px;color:var(--text2)">Asset: <strong style="color:var(--text)">${a.name}</strong></div>`:''}
  <div class="form-group"><label class="form-label">Share With</label><input class="form-input" id="m-shwith" placeholder="Editor name or email"></div>
  <div class="form-group"><label class="form-label">Expiry Date</label><input class="form-input" id="m-shexp" type="date" value="${new Date(Date.now()+30*86400000).toISOString().slice(0,10)}"></div>
  <div class="modal-actions">
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
    <button class="modal-btn primary" onclick="createShareForAsset('${assetId}')">Generate Link</button>
  </div>`;
}

function createShare(){
  const assetId=document.getElementById('m-shasset')?.value;
  createShareForAsset(assetId);
}

function createShareForAsset(assetId){
  const sharedWith=document.getElementById('m-shwith')?.value?.trim();
  const expiryDate=document.getElementById('m-shexp')?.value;
  if(!sharedWith){showNotif('Please specify who to share with','error');return;}
  const asset=getAssets().find(a=>a.id===assetId);
  const code=Math.random().toString(36).slice(2,8).toUpperCase();
  const shares=getShares();
  shares.push({id:'sh'+Date.now(),assetId,assetName:asset?.name||'Asset',sharedWith,expiryDate,createdAt:new Date().toISOString().slice(0,10),code,status:'active'});
  saveShares(shares);
  addLog('Share Link Generated',`${asset?.name} shared with ${sharedWith}`);
  showNotif('Share link created!');closeModal();state.page='shares';render();
}

// ===== BIND LAYOUT =====
function bindLayout(){
  // keyboard shortcut
  document.onkeydown=e=>{if(e.key==='Escape'&&state.modal){closeModal()}};
}

// ===== INIT =====
(function(){
  const auth=getLS('auth',null);
  if(auth){state.user=auth;initData();}
  render();
})();
</script>
</body>
</html>
